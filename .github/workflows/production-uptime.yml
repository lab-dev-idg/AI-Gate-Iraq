name: Production Uptime Check

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: read

jobs:
  uptime:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check website
        run: |
          curl --fail --silent --show-error --location --retry 3 --retry-all-errors --max-time 60 https://ai-gate-iraq-website.web.app/ > /dev/null

      - name: Check platform
        run: |
          curl --fail --silent --show-error --location --retry 3 --retry-all-errors --max-time 60 https://ai-gate-iraq-platform.web.app/ > /dev/null
