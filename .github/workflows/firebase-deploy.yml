name: Firebase Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_scope:
        description: Select what to deploy
        required: true
        default: all
        type: choice
        options:
          - all
          - platform
          - website
          - firestore

permissions:
  contents: read
  id-token: write

concurrency:
  group: firebase-production-deploy
  cancel-in-progress: false

jobs:
  verify-and-deploy:
    name: Verify and deploy to Firebase
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production

    env:
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
      VITE_RECAPTCHA_ENTERPRISE_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_ENTERPRISE_SITE_KEY }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AI_GATE_IRAQ }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          required=(
            VITE_FIREBASE_API_KEY
            VITE_FIREBASE_AUTH_DOMAIN
            VITE_FIREBASE_PROJECT_ID
            VITE_FIREBASE_STORAGE_BUCKET
            VITE_FIREBASE_MESSAGING_SENDER_ID
            VITE_FIREBASE_APP_ID
            VITE_RECAPTCHA_ENTERPRISE_SITE_KEY
          )

          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required GitHub Actions secret: $name"
              exit 1
            fi
          done

          if [ "$VITE_FIREBASE_PROJECT_ID" != "ai-gate-iraq" ]; then
            echo "VITE_FIREBASE_PROJECT_ID must equal ai-gate-iraq"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run project guard
        run: npm run check:project

      - name: Run TypeScript validation
        run: npm run lint

      - name: Build production platform
        run: npm run build

      - name: Prepare Firebase platform package
        run: npm run prepare:firebase-platform

      - name: Deploy Firestore rules
        if: ${{ inputs.deploy_scope == 'all' || inputs.deploy_scope == 'firestore' }}
        run: >-
          npx firebase-tools@latest deploy
          --only firestore:rules
          --project ai-gate-iraq
          --non-interactive

      - name: Deploy website hosting
        if: ${{ inputs.deploy_scope == 'all' || inputs.deploy_scope == 'website' }}
        shell: bash
        run: |
          set -uo pipefail
          log_file="$(mktemp)"

          set +e
          npx firebase-tools@latest deploy \
            --only hosting:website \
            --project ai-gate-iraq \
            --non-interactive 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          if grep -Fq 'is the current active version' "$log_file"; then
            echo 'Website version is already active; treating the idempotent Firebase response as success.'
            exit 0
          fi

          exit "$status"

      - name: Deploy platform hosting
        if: ${{ inputs.deploy_scope == 'all' || inputs.deploy_scope == 'platform' }}
        shell: bash
        run: |
          set -uo pipefail
          log_file="$(mktemp)"

          set +e
          npx firebase-tools@latest deploy \
            --only hosting:platform \
            --project ai-gate-iraq \
            --non-interactive 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          if grep -Fq 'is the current active version' "$log_file"; then
            echo 'Platform version is already active; treating the idempotent Firebase response as success.'
            exit 0
          fi

          exit "$status"

      - name: Verify production endpoints
        if: ${{ inputs.deploy_scope == 'all' || inputs.deploy_scope == 'platform' || inputs.deploy_scope == 'website' }}
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ inputs.deploy_scope }}" = "all" ] || [ "${{ inputs.deploy_scope }}" = "website" ]; then
            curl --fail --silent --show-error --location --max-time 20 \
              https://ai-gate-iraq-website.web.app/quality.html > /dev/null
          fi

          if [ "${{ inputs.deploy_scope }}" = "all" ] || [ "${{ inputs.deploy_scope }}" = "platform" ]; then
            curl --fail --silent --show-error --location --max-time 20 \
              https://ai-gate-iraq-platform.web.app/ > /dev/null
          fi

      - name: Deployment summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Firebase deployment"
            echo "- Project: ai-gate-iraq"
            echo "- Scope: ${{ inputs.deploy_scope }}"
            echo "- Commit: $GITHUB_SHA"
            echo "- Website: https://ai-gate-iraq-website.web.app"
            echo "- Platform: https://ai-gate-iraq-platform.web.app"
          } >> "$GITHUB_STEP_SUMMARY"
